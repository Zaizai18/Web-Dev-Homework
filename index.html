<script>
  const slides = document.getElementById("slides");
const slideElements = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

let visibleSlides = 3;
let index = 3; 
let isTransitioning = false;

function updateVisibleSlides() {
  if (window.innerWidth <= 600) visibleSlides = 1;
  else if (window.innerWidth <= 900) visibleSlides = 2;
  else visibleSlides = 3;
}
updateVisibleSlides();
window.addEventListener("resize", () => {
  updateVisibleSlides();
  moveToIndex(index, false);
});

function moveToIndex(i, animate = true) {
  if (!animate) slides.style.transition = "none";
  else slides.style.transition = "transform 0.5s ease-in-out";

  slides.style.transform = `translateX(-${i * (100 / visibleSlides)}%)`;

  
  dots.forEach(dot => dot.classList.remove("active"));
  const dotIndex = (i - 3 + 6) % 6;
  dots[dotIndex].classList.add("active");
}

moveToIndex(index, false);

function changeSlide(dir) {
  if (isTransitioning) return;
  isTransitioning = true;

  index += dir;
  moveToIndex(index);

  slides.addEventListener("transitionend", handleLoop, { once: true });
}

function handleLoop() {
  if (index >= 9) index = 3;  
  if (index < 3) index = 8; 
  moveToIndex(index, false);
  isTransitioning = false;
}

function goToSlide(n) {
  index = n + 3; 
  moveToIndex(index);
}

function clearCart(){
  cart = [];
  updateCart();
}

  function toggleNav() {
    const nav = document.querySelector('nav');
    nav.classList.toggle('open');
  }

  const navLinks = document.querySelectorAll('nav a');
  navLinks.forEach(link =>
    link.addEventListener('click', () => document.querySelector('nav').classList.remove('open'))
  );

</script>
